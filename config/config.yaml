# ══════════════════════════════════════════════════════════════════════════════
# SBMA RNAseq Generalized Pipeline — Configuration
# Configured for GSE142612 (Okada et al.) SBMA Fibroblast Dataset
# ══════════════════════════════════════════════════════════════════════════════

# ── Global settings ──
species: "human"
orgdb: "org.Hs.eg.db"
kegg_organism: "hsa"
reactome_organism: "human"

thresholds:
  lfc: 1.0
  padj: 0.05
  min_mean_expression: 0    # Filter genes with mean expression below this value
                            # (applies to full_ranked data only). Set to 0 to disable.
                            # Recommended: 1.0 for TPM data, 10 for raw counts.

enrichment:
  pvalue_cutoff: 0.05
  qvalue_cutoff: 0.05
  min_gs_size: 15
  max_gs_size: 500
  simplify_cutoff: 0.7
  n_perm: 10000
  seed: 42

databases:
  - GO_BP
  - GO_CC
  - GO_MF
  - KEGG
  - Reactome
  - Hallmarks
  - WikiPathways

colors:
  up: "#bb0c00"
  down: "#00AFBB"
  ns: "grey60"
  heatmap_low: "#2166AC"
  heatmap_mid: "white"
  heatmap_high: "#B2182B"

plots:
  dpi: 300
  base_size: 14
  format:
    - "pdf"
    - "png"

# ── Datasets ──
datasets:
  SBMA_Fibroblast_Okada:
    tissue_type: "fibroblast"
    contrasts:
      purified_sbma_vs_control:
        label: "SBMA vs Control (Purified)"
        deg_file: "data/SBMA_Fibroblast_Okada/purified_degs.csv"
        full_ranked: false
        androgen_treatment: false
        columns:
          gene_symbol: "gene_symbol"
          log2fc: "log2fc"
          pvalue: "pvalue"
          padj: "padj"
      unpurified_sbma_vs_control:
        label: "SBMA vs Control (Unpurified)"
        deg_file: "data/SBMA_Fibroblast_Okada/unpurified_degs.csv"
        full_ranked: false
        androgen_treatment: false
        columns:
          gene_symbol: "gene_symbol"
          log2fc: "log2fc"
          pvalue: "pvalue"
          padj: "padj"
      full_ranked_unpurified:
        label: "SBMA vs Control (Unpurified/NT, Full Ranked)"
        deg_file: "data/SBMA_Fibroblast_Okada/full_ranked_NT_degs.csv"
        full_ranked: true
        androgen_treatment: false
        columns:
          gene_symbol: "gene_symbol"
          log2fc: "log2fc"
          pvalue: "pvalue"
          padj: "padj"
      full_ranked_purified:
        label: "SBMA vs Control (Purified/P4, Full Ranked)"
        deg_file: "data/SBMA_Fibroblast_Okada/full_ranked_P4_degs.csv"
        full_ranked: true
        androgen_treatment: false
        columns:
          gene_symbol: "gene_symbol"
          log2fc: "log2fc"
          pvalue: "pvalue"
          padj: "padj"

# ── Cross-comparisons ──
cross_comparisons:
  within_dataset:
    - dataset: "SBMA_Fibroblast_Okada"
      contrasts:
        - "purified_sbma_vs_control"
        - "unpurified_sbma_vs_control"
    - dataset: "SBMA_Fibroblast_Okada"
      contrasts:
        - "full_ranked_unpurified"
        - "full_ranked_purified"
